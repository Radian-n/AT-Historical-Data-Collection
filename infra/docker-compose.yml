services:
  at-collector:
    image: ghcr.io/radian-n/at-historical-data-collection:latest
    container_name: at-collector
    restart: unless-stopped
    stop_grace_period: 100s  # Give time to finish cleanly
    env_file:
      - .env

  watchtower:
    image: nickfedor/watchtower   # replaces containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_STOPPED=true